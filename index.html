<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Мастер | Редактор и Конвертер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-file-pdf"></i> PDF Мастер</h1>
            <p>Полнофункциональный редактор и конвертер в вашем браузере</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="convert"><i class="fas fa-images"></i> Конвертация</button>
            <button class="tab-btn" data-tab="edit"><i class="fas fa-edit"></i> Редактор PDF</button>
            <button class="tab-btn" data-tab="merge"><i class="fas fa-object-group"></i> Объединение</button>
        </div>

        <!-- Вкладка конвертации -->
        <div id="convert" class="tab-content active"></div>

        <!-- Вкладка редактора -->
        <div id="edit" class="tab-content"></div>

        <!-- Вкладка объединения -->
        <div id="merge" class="tab-content">
            <div class="tool-card">
                <h3><i class="fas fa-layer-group"></i> Объединение PDF файлов</h3>
                <div class="drop-zone" id="mergeDropZone">
                    <i class="fas fa-cloud-upload-alt fa-3x"></i>
                    <p>Перетащите PDF файлы сюда или кликните для выбора</p>
                    <input type="file" id="mergeFileInput" multiple accept=".pdf" style="display:none;">
                </div>
                <div id="mergeFileList" class="file-list"></div>
                <button id="mergeBtn" class="primary-btn"><i class="fas fa-compress-alt"></i> Объединить PDF</button>
                <button id="clearMergeBtn"><i class="fas fa-trash"></i> Очистить</button>
            </div>
        </div>
    </div>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- fontkit для поддержки кириллицы -->
    <script src="https://cdn.jsdelivr.net/npm/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
    
    <!-- Модули приложения -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
