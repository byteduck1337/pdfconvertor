<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Редактор Pro - С поддержкой OCR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        /* Контент вкладок */
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .tab-content.active {
            display: block;
        }

        /* Карточки инструментов */
        .tools {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease-out;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .tool-card h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.4em;
        }

        /* Элементы управления */
        .file-input {
            width: 100%;
            padding: 12px;
            border: 2px dashed #ddd;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-input:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Превью изображений */
        .image-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .image-item {
            position: relative;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            transition: all 0.3s ease;
            animation: fadeIn 0.3s ease;
        }

        .image-item:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .image-item img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .remove-image {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .remove-image:hover {
            transform: scale(1.1);
        }

        /* Область PDF */
        .pdf-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 20px;
        }

        .pdf-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .text-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .text-controls input, .text-controls select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            overflow-x: auto;
            text-align: center;
        }

        #pdfCanvas {
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: crosshair;
            max-width: 100%;
            height: auto;
        }

        .coords-info {
            position: fixed;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
        }

        .status {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 12px;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .tools {
                grid-template-columns: 1fr;
            }
            
            .tab-btn {
                padding: 8px 20px;
                font-size: 14px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 PDF Редактор Pro</h1>
            <p>Конвертация изображений в PDF | Редактирование PDF с поддержкой текста</p>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="convert">🖼️ Конвертация в PDF</button>
            <button class="tab-btn" data-tab="edit">✏️ Редактор PDF</button>
        </div>

        <!-- Вкладка конвертации -->
        <div id="convert" class="tab-content active">
            <div class="tools">
                <div class="tool-card">
                    <h3>🖼️ Конвертация изображений в PDF</h3>
                    <input type="file" id="imageInput" class="file-input" multiple accept="image/jpeg,image/jpg,image/png,image/gif,image/webp">
                    <div id="imageList" class="image-preview"></div>
                    <div class="controls">
                        <button id="convertToPdf">📑 Конвертировать в PDF</button>
                        <button id="clearImages">🗑️ Очистить все</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Вкладка редактирования -->
        <div id="edit" class="tab-content">
            <div class="pdf-container">
                <div class="pdf-toolbar">
                    <input type="file" id="pdfInput" accept=".pdf">
                    <button id="ocrTextBtn">🔍 Распознать текст (OCR)</button>
                    <button id="savePdfBtn">💾 Сохранить PDF</button>
                </div>

                <!-- Настройки текста -->
                <div class="text-controls">
                    <span>✏️ Настройки текста:</span>
                    <input type="text" id="textInput" placeholder="Введите текст" style="flex: 1;">
                    <select id="fontSelect">
                        <option value="helvetica">Helvetica</option>
                        <option value="times">Times Roman</option>
                        <option value="courier">Courier</option>
                    </select>
                    <input type="number" id="fontSize" value="16" min="8" max="72" step="1" style="width: 70px;">
                    <select id="fontColor">
                        <option value="black">Черный</option>
                        <option value="red">Красный</option>
                        <option value="blue">Синий</option>
                        <option value="green">Зеленый</option>
                    </select>
                </div>

                <div class="canvas-container">
                    <canvas id="pdfCanvas"></canvas>
                </div>

                <div class="controls" style="text-align: center; margin-top: 15px;">
                    <button id="prevPage">◀ Предыдущая</button>
                    <span id="pageInfo" style="margin: 0 15px;">Страница 1 / 1</span>
                    <button id="nextPage">Следующая ▶</button>
                </div>

                <div class="status" id="pdfStatus">
                    💡 Инструкция: Загрузите PDF, нажмите на любом месте страницы, чтобы добавить текст с выбранными настройками
                </div>
            </div>
        </div>
    </div>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
        // ========== Управление вкладками ==========
        const tabs = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.getAttribute('data-tab');
                tabs.forEach(t => t.classList.remove('active'));
                tabContents.forEach(content => content.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            });
        });

        // ========== Конвертация изображений ==========
        let imagesList = [];

        const imageInput = document.getElementById('imageInput');
        const imageListDiv = document.getElementById('imageList');
        const convertToPdf = document.getElementById('convertToPdf');
        const clearImages = document.getElementById('clearImages');

        imageInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imagesList.push({
                        name: file.name,
                        data: event.target.result,
                        type: file.type
                    });
                    displayImages();
                };
                reader.readAsDataURL(file);
            }
        });

        function displayImages() {
            imageListDiv.innerHTML = '';
            imagesList.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'image-item';
                div.innerHTML = `
                    <img src="${img.data}" alt="${img.name}">
                    <div class="remove-image" onclick="removeImage(${index})">×</div>
                    <div style="font-size: 12px; margin-top: 5px;">${img.name.substring(0, 20)}</div>
                `;
                imageListDiv.appendChild(div);
            });
        }

        window.removeImage = (index) => {
            imagesList.splice(index, 1);
            displayImages();
        };

        clearImages.addEventListener('click', () => {
            imagesList = [];
            displayImages();
            imageInput.value = '';
        });

        convertToPdf.addEventListener('click', async () => {
            if (imagesList.length === 0) {
                alert('Пожалуйста, добавьте хотя бы одно изображение');
                return;
            }

            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.create();

            for (const image of imagesList) {
                let imageEmbed;
                if (image.type.includes('png')) {
                    imageEmbed = await pdfDoc.embedPng(image.data);
                } else {
                    imageEmbed = await pdfDoc.embedJpg(image.data);
                }
                
                const page = pdfDoc.addPage([imageEmbed.width, imageEmbed.height]);
                page.drawImage(imageEmbed, {
                    x: 0,
                    y: 0,
                    width: imageEmbed.width,
                    height: imageEmbed.height,
                });
            }

            const pdfBytes = await pdfDoc.save();
            downloadPDF(pdfBytes, 'converted_images.pdf');
            alert('✅ PDF успешно создан!');
        });

        // ========== Редактор PDF ==========
        let currentPdfDoc = null;
        let currentPdfBytes = null;
        let currentPageNum = 1;
        let totalPages = 0;
        let scale = 1.5;
        
        const pdfCanvas = document.getElementById('pdfCanvas');
        const pdfInput = document.getElementById('pdfInput');
        const savePdfBtn = document.getElementById('savePdfBtn');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageInfoSpan = document.getElementById('pageInfo');
        const pdfStatus = document.getElementById('pdfStatus');
        const ocrTextBtn = document.getElementById('ocrTextBtn');
        
        // Настройки текста
        const textInput = document.getElementById('textInput');
        const fontSelect = document.getElementById('fontSelect');
        const fontSize = document.getElementById('fontSize');
        const fontColor = document.getElementById('fontColor');

        let pdfDocForRender = null;

        // Загрузка PDF
        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                currentPdfBytes = event.target.result;
                await loadPDFForEdit(currentPdfBytes);
                pdfStatus.innerHTML = '✅ PDF загружен. Нажмите на любое место страницы, чтобы добавить текст';
                pdfStatus.style.background = '#d4edda';
                setTimeout(() => {
                    pdfStatus.style.background = '#f0f0f0';
                }, 3000);
            };
            reader.readAsArrayBuffer(file);
        });

        async function loadPDFForEdit(pdfBytes) {
            const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
            pdfDocForRender = await loadingTask.promise;
            totalPages = pdfDocForRender.numPages;
            currentPageNum = 1;
            
            const { PDFDocument } = PDFLib;
            currentPdfDoc = await PDFDocument.load(pdfBytes);
            
            await renderPage(currentPageNum);
            updatePageInfo();
        }

        async function renderPage(pageNum) {
            const page = await pdfDocForRender.getPage(pageNum);
            const viewport = page.getViewport({ scale: scale });
            
            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;
            
            const context = pdfCanvas.getContext('2d');
            const renderContext = {
                canvasContext: context,
                viewport: viewport,
            };
            
            await page.render(renderContext).promise;
        }

        function updatePageInfo() {
            pageInfoSpan.textContent = `Страница ${currentPageNum} / ${totalPages}`;
        }

        prevPageBtn.addEventListener('click', async () => {
            if (currentPageNum <= 1) return;
            currentPageNum--;
            await renderPage(currentPageNum);
            updatePageInfo();
        });

        nextPageBtn.addEventListener('click', async () => {
            if (currentPageNum >= totalPages) return;
            currentPageNum++;
            await renderPage(currentPageNum);
            updatePageInfo();
        });

        // Добавление текста по клику
        pdfCanvas.addEventListener('click', async (e) => {
            if (!currentPdfDoc) {
                alert('Пожалуйста, сначала загрузите PDF файл');
                return;
            }
            
            const text = textInput.value.trim();
            if (!text) {
                alert('Введите текст в поле выше');
                return;
            }
            
            // Получаем координаты клика относительно canvas
            const rect = pdfCanvas.getBoundingClientRect();
            const scaleX = pdfCanvas.width / rect.width;
            const scaleY = pdfCanvas.height / rect.height;
            
            let x = (e.clientX - rect.left) * scaleX;
            let y = pdfCanvas.height - ((e.clientY - rect.top) * scaleY);
            
            // Получаем страницу для редактирования
            const pages = currentPdfDoc.getPages();
            const page = pages[currentPageNum - 1];
            
            // Настройки цвета
            let color;
            switch(fontColor.value) {
                case 'red': color = { r: 1, g: 0, b: 0 }; break;
                case 'blue': color = { r: 0, g: 0, b: 1 }; break;
                case 'green': color = { r: 0, g: 1, b: 0 }; break;
                default: color = { r: 0, g: 0, b: 0 };
            }
            
            // Добавляем текст
            page.drawText(text, {
                x: x,
                y: y,
                size: parseInt(fontSize.value),
                font: await getFont(fontSelect.value),
                color: color
            });
            
            // Сохраняем изменения
            const pdfBytes = await currentPdfDoc.save();
            currentPdfBytes = pdfBytes;
            await loadPDFForEdit(pdfBytes);
            
            pdfStatus.innerHTML = `✅ Текст "${text}" добавлен в позицию (${Math.round(x)}, ${Math.round(y)})`;
            pdfStatus.style.background = '#d4edda';
            setTimeout(() => {
                pdfStatus.style.background = '#f0f0f0';
            }, 2000);
        });

        async function getFont(fontName) {
            const { PDFDocument, StandardFonts } = PDFLib;
            switch(fontName) {
                case 'times': return await currentPdfDoc.embedFont(StandardFonts.TimesRoman);
                case 'courier': return await currentPdfDoc.embedFont(StandardFonts.Courier);
                default: return await currentPdfDoc.embedFont(StandardFonts.Helvetica);
            }
        }

        // OCR - распознавание текста
        ocrTextBtn.addEventListener('click', async () => {
            if (!currentPdfBytes) {
                alert('Сначала загрузите PDF файл');
                return;
            }
            
            pdfStatus.innerHTML = '🔄 Выполняется OCR распознавание текста... Пожалуйста, подождите';
            pdfStatus.style.background = '#fff3cd';
            
            // Конвертируем текущую страницу в изображение для OCR
            const canvas = pdfCanvas;
            const imageData = canvas.toDataURL('image/png');
            
            try {
                const worker = await Tesseract.createWorker('rus+eng');
                const ret = await worker.recognize(imageData);
                await worker.terminate();
                
                const recognizedText = ret.data.text;
                if (recognizedText.trim()) {
                    pdfStatus.innerHTML = `📝 Распознанный текст:\n${recognizedText.substring(0, 500)}${recognizedText.length > 500 ? '...' : ''}`;
                    pdfStatus.style.background = '#d4edda';
                    
                    // Предлагаем добавить распознанный текст
                    if (confirm('Распознанный текст получен. Добавить его на страницу?')) {
                        textInput.value = recognizedText.substring(0, 200);
                    }
                } else {
                    pdfStatus.innerHTML = '❌ Текст не распознан. Убедитесь, что на странице есть четкий текст';
                    pdfStatus.style.background = '#f8d7da';
                }
            } catch (error) {
                console.error('OCR Error:', error);
                pdfStatus.innerHTML = '❌ Ошибка OCR. Попробуйте другую страницу';
                pdfStatus.style.background = '#f8d7da';
            }
            
            setTimeout(() => {
                if (pdfStatus.style.background !== '#d4edda') {
                    pdfStatus.style.background = '#f0f0f0';
                }
            }, 5000);
        });

        // Сохранение PDF
        savePdfBtn.addEventListener('click', async () => {
            if (!currentPdfBytes) {
                alert('Нет PDF для сохранения');
                return;
            }
            downloadPDF(currentPdfBytes, 'edited_document.pdf');
            pdfStatus.innerHTML = '✅ PDF сохранен!';
            pdfStatus.style.background = '#d4edda';
            setTimeout(() => {
                pdfStatus.style.background = '#f0f0f0';
            }, 2000);
        });

        function downloadPDF(pdfBytes, filename) {
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // Отображение координат при наведении
        pdfCanvas.addEventListener('mousemove', (e) => {
            if (!currentPdfDoc) return;
            
            const rect = pdfCanvas.getBoundingClientRect();
            const scaleX = pdfCanvas.width / rect.width;
            const scaleY = pdfCanvas.height / rect.height;
            
            let x = (e.clientX - rect.left) * scaleX;
            let y = pdfCanvas.height - ((e.clientY - rect.top) * scaleY);
            
            // Показываем координаты
            let coordsDiv = document.querySelector('.coords-info');
            if (!coordsDiv) {
                coordsDiv = document.createElement('div');
                coordsDiv.className = 'coords-info';
                document.body.appendChild(coordsDiv);
            }
            coordsDiv.style.left = (e.clientX + 10) + 'px';
            coordsDiv.style.top = (e.clientY - 30) + 'px';
            coordsDiv.innerHTML = `X: ${Math.round(x)}, Y: ${Math.round(y)}`;
            
            setTimeout(() => {
                if (coordsDiv) coordsDiv.style.opacity = '0.7';
            }, 100);
        });
        
        pdfCanvas.addEventListener('mouseleave', () => {
            const coordsDiv = document.querySelector('.coords-info');
            if (coordsDiv) coordsDiv.remove();
        });
    </script>
</body>
</html>
