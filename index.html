<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Редактор - Конвертация изображений в PDF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tools {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tool-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .tool-card:hover {
            transform: translateY(-5px);
        }

        .tool-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .file-input {
            width: 100%;
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .file-input:hover {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.3s;
            margin: 5px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .preview-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .preview-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .image-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .image-item {
            position: relative;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .image-item img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .canvas-preview {
            border: 1px solid #ddd;
            border-radius: 10px;
            max-width: 100%;
            margin-top: 15px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .status {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 10px;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        @media (max-width: 768px) {
            .tools {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 PDF Редактор Pro</h1>
            <p>Конвертируйте изображения в PDF, редактируйте документы прямо в браузере</p>
        </div>

        <div class="tools">
            <!-- Конвертация изображений в PDF -->
            <div class="tool-card">
                <h3>🖼️ Конвертация изображений в PDF</h3>
                <input type="file" id="imageInput" class="file-input" multiple accept="image/jpeg,image/jpg,image/png,image/gif,image/webp">
                <div id="imageList" class="image-preview"></div>
                <div class="controls">
                    <button id="convertToPdf">📑 Конвертировать в PDF</button>
                    <button id="clearImages">🗑️ Очистить все</button>
                </div>
            </div>

            <!-- Редактирование PDF -->
            <div class="tool-card">
                <h3>✏️ Редактирование PDF</h3>
                <input type="file" id="pdfInput" class="file-input" accept=".pdf">
                <div class="controls">
                    <button id="addTextBtn">➕ Добавить текст</button>
                    <button id="addImageToPdfBtn">🖼️ Добавить изображение</button>
                    <button id="savePdfBtn">💾 Сохранить PDF</button>
                </div>
                <div class="status" id="pdfStatus">
                    Загрузите PDF для редактирования
                </div>
            </div>
        </div>

        <!-- Предпросмотр PDF -->
        <div class="preview-area" id="pdfPreview" style="display: none;">
            <div class="preview-title">📄 Предпросмотр PDF</div>
            <canvas id="pdfCanvas" class="canvas-preview" style="max-width: 100%;"></canvas>
            <div class="controls">
                <button id="prevPage">◀ Предыдущая</button>
                <span id="pageInfo" style="margin: 0 10px;">Страница 1 / 1</span>
                <button id="nextPage">Следующая ▶</button>
            </div>
        </div>
    </div>

    <!-- Подключаем необходимые библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <script>
        // Инициализация переменных
        let imagesList = [];
        let currentPdfDoc = null;
        let currentPdfBytes = null;
        let currentPage = 0;
        let totalPages = 0;
        let pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Конвертация изображений в PDF
        const imageInput = document.getElementById('imageInput');
        const imageList = document.getElementById('imageList');
        const convertToPdf = document.getElementById('convertToPdf');
        const clearImages = document.getElementById('clearImages');

        imageInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imagesList.push({
                        name: file.name,
                        data: event.target.result,
                        type: file.type
                    });
                    displayImages();
                };
                reader.readAsDataURL(file);
            }
        });

        function displayImages() {
            imageList.innerHTML = '';
            imagesList.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'image-item';
                div.innerHTML = `
                    <img src="${img.data}" alt="${img.name}">
                    <div class="remove-image" onclick="removeImage(${index})">×</div>
                    <div style="font-size: 12px; margin-top: 5px;">${img.name.substring(0, 20)}</div>
                `;
                imageList.appendChild(div);
            });
        }

        window.removeImage = (index) => {
            imagesList.splice(index, 1);
            displayImages();
        };

        clearImages.addEventListener('click', () => {
            imagesList = [];
            displayImages();
            imageInput.value = '';
        });

        convertToPdf.addEventListener('click', async () => {
            if (imagesList.length === 0) {
                alert('Пожалуйста, добавьте хотя бы одно изображение');
                return;
            }

            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.create();

            for (const image of imagesList) {
                let imageEmbed;
                if (image.type.includes('png')) {
                    imageEmbed = await pdfDoc.embedPng(image.data);
                } else if (image.type.includes('jpeg') || image.type.includes('jpg')) {
                    imageEmbed = await pdfDoc.embedJpg(image.data);
                } else {
                    // Конвертируем другие форматы через canvas
                    const img = new Image();
                    img.src = image.data;
                    await new Promise((resolve) => { img.onload = resolve; });
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const jpegData = canvas.toDataURL('image/jpeg');
                    imageEmbed = await pdfDoc.embedJpg(jpegData);
                }

                const page = pdfDoc.addPage([imageEmbed.width, imageEmbed.height]);
                page.drawImage(imageEmbed, {
                    x: 0,
                    y: 0,
                    width: imageEmbed.width,
                    height: imageEmbed.height,
                });
            }

            const pdfBytes = await pdfDoc.save();
            downloadPDF(pdfBytes, 'converted_images.pdf');
            alert('PDF успешно создан!');
        });

        // Редактирование PDF
        const pdfInput = document.getElementById('pdfInput');
        const addTextBtn = document.getElementById('addTextBtn');
        const addImageToPdfBtn = document.getElementById('addImageToPdfBtn');
        const savePdfBtn = document.getElementById('savePdfBtn');
        const pdfPreview = document.getElementById('pdfPreview');
        const pdfCanvas = document.getElementById('pdfCanvas');
        const prevPage = document.getElementById('prevPage');
        const nextPage = document.getElementById('nextPage');
        const pageInfo = document.getElementById('pageInfo');

        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                currentPdfBytes = event.target.result;
                await loadPDF(currentPdfBytes);
                document.getElementById('pdfStatus').innerHTML = '✅ PDF загружен. Используйте инструменты для редактирования';
                pdfPreview.style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        });

        async function loadPDF(pdfBytes) {
            const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
            const pdf = await loadingTask.promise;
            totalPages = pdf.numPages;
            currentPage = 1;
            await renderPage(currentPage, pdf);
            
            // Сохраняем PDF документ для редактирования
            const { PDFDocument } = PDFLib;
            currentPdfDoc = await PDFDocument.load(pdfBytes);
        }

        async function renderPage(pageNum, pdf) {
            const page = await pdf.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1.5 });
            const canvas = pdfCanvas;
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderContext = {
                canvasContext: context,
                viewport: viewport,
            };
            await page.render(renderContext).promise;
            pageInfo.textContent = `Страница ${pageNum} / ${totalPages}`;
        }

        prevPage.addEventListener('click', async () => {
            if (currentPage <= 1) return;
            currentPage--;
            const pdf = await pdfjsLib.getDocument({ data: currentPdfBytes }).promise;
            await renderPage(currentPage, pdf);
        });

        nextPage.addEventListener('click', async () => {
            if (currentPage >= totalPages) return;
            currentPage++;
            const pdf = await pdfjsLib.getDocument({ data: currentPdfBytes }).promise;
            await renderPage(currentPage, pdf);
        });

        addTextBtn.addEventListener('click', async () => {
            if (!currentPdfDoc) {
                alert('Пожалуйста, сначала загрузите PDF файл');
                return;
            }

            const text = prompt('Введите текст для добавления:');
            if (!text) return;

            const pages = currentPdfDoc.getPages();
            const page = pages[currentPage - 1];
            
            page.drawText(text, {
                x: 50,
                y: page.getHeight() - 100,
                size: 20,
                color: { r: 0, g: 0, b: 0 }
            });

            // Обновляем байты
            const pdfBytes = await currentPdfDoc.save();
            currentPdfBytes = pdfBytes;
            await loadPDF(pdfBytes);
            document.getElementById('pdfStatus').innerHTML = '✅ Текст добавлен. Не забудьте сохранить PDF!';
        });

        addImageToPdfBtn.addEventListener('click', () => {
            if (!currentPdfDoc) {
                alert('Пожалуйста, сначала загрузите PDF файл');
                return;
            }

            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/jpeg,image/jpg,image/png';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (event) => {
                    const imageData = event.target.result;
                    const pages = currentPdfDoc.getPages();
                    const page = pages[currentPage - 1];
                    
                    let image;
                    if (file.type.includes('png')) {
                        image = await currentPdfDoc.embedPng(imageData);
                    } else {
                        image = await currentPdfDoc.embedJpg(imageData);
                    }
                    
                    page.drawImage(image, {
                        x: 50,
                        y: page.getHeight() - 300,
                        width: 200,
                        height: 200,
                    });

                    const pdfBytes = await currentPdfDoc.save();
                    currentPdfBytes = pdfBytes;
                    await loadPDF(pdfBytes);
                    document.getElementById('pdfStatus').innerHTML = '✅ Изображение добавлено. Не забудьте сохранить PDF!';
                };
                reader.readAsArrayBuffer(file);
            };
            input.click();
        });

        savePdfBtn.addEventListener('click', async () => {
            if (!currentPdfBytes) {
                alert('Нет PDF для сохранения');
                return;
            }
            downloadPDF(currentPdfBytes, 'edited_document.pdf');
            document.getElementById('pdfStatus').innerHTML = '✅ PDF сохранен!';
        });

        function downloadPDF(pdfBytes, filename) {
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // Дополнительная функция для конвертации изображений через canvas
        async function convertImageToPDF(imageData, filename) {
            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.create();
            
            let image;
            if (imageData.type.includes('png')) {
                image = await pdfDoc.embedPng(imageData.data);
            } else {
                image = await pdfDoc.embedJpg(imageData.data);
            }
            
            const page = pdfDoc.addPage([image.width, image.height]);
            page.drawImage(image, {
                x: 0,
                y: 0,
                width: image.width,
                height: image.height,
            });
            
            const pdfBytes = await pdfDoc.save();
            downloadPDF(pdfBytes, filename);
        }
    </script>
</body>
</html>
